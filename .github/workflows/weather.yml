name: Matrix

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  weather:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        city: ["London", "Tokyo", "Prague"]

    steps:
      - name: Fetch weather
        run: |
          CITY="${{ matrix.city }}"
          WEATHER=$(curl -s "wttr.in/$CITY?format=3")

          echo "$CITY|$WEATHER" > result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: weather-${{ matrix.city }}
          path: result.txt

  build:
    runs-on: ubuntu-latest
    needs: weather

    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Generate HTML
        run: |
          echo "<!DOCTYPE html>" > index.html
          echo "<html><head><meta charset='UTF-8'><title>Weather</title></head><body>" >> index.html
          echo "<h1>🌤 Weather Summary</h1>" >> index.html
          echo "<table border='1' cellpadding='8'>" >> index.html
          echo "<tr><th>City</th><th>Weather</th></tr>" >> index.html

          for file in results/*/result.txt; do
            LINE=$(cat "$file")
            CITY=$(echo "$LINE" | cut -d'|' -f1)
            WEATHER=$(echo "$LINE" | cut -d'|' -f2-)

            echo "<tr><td>$CITY</td><td>$WEATHER</td></tr>" >> index.html
          done

          echo "</table>" >> index.html
          echo "</body></html>" >> index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
