name: CI

on:
  schedule:
    - cron: "0 * * * *"  
  workflow_dispatch:   

jobs:
  weather:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        city: ["London", "New York", "Tokyo", "Prague"]

    steps:
      - name: Fetch weather
        run: |
          CITY="${{ matrix.city }}"
          WEATHER=$(curl -s "wttr.in/$CITY?format=3")

          echo "Weather in $CITY: $WEATHER"

          echo "## $CITY Weather" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$WEATHER**" >> $GITHUB_STEP_SUMMARY
